verse: 2
kjv:
  - >
    And I will make of thee a great nation, and I will bless thee, and make thy
    name great; and thou shalt be a blessing:
nkjv:
  - I will make you a great nation;
  - I will bless you
  - And make your name great;
  - And you shall be a blessing.
niv:
  - >
    "I will make you into a great nation, and I will bless you; I will make your
    name great, and you will be a blessing.
esv:
  - >
    And I will make of you a great nation, and I will bless you and make your name
    great, so that you will be a blessing.
