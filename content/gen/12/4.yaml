chapter: 12
verse: 4
kjv:
  - >
    So Abram departed, as the LORD had spoken unto him; and Lot went with him:
    and Abram was seventy and five years old when he departed out of Haran.
nkjv:
  - >
    So Abram departed as the LORD had spoken to him, and Lot went with him.
    And Abram was seventy-five years old when he departed from Haran.
niv:
  - >
    So Abram went, as the LORD had told him; and Lot went with him. Abram was
    seventy-five years old when he set out from Harran.
