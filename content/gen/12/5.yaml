verse: 5
kjv:
  - >
    And Abram took Sarai his wife, and Lot his brother's son, and all their substance
    that they had gathered, and the souls that they had gotten in Haran; and they
    went forth to go into the land of Canaan; and into the land of Canaan they came.
nkjv:
  - >
    Then Abram took Sarai his wife and Lot his brother's son, and all their
    possessions that they had gathered, and the people whom they had acquired
    in Haran, and they departed to go to the land of Canaan.So they came to
    the land of Canaan.
niv:
  - >
    He took his wife Sarai, his nephew Lot, all the possessions they had accumulated
    and the people they had acquired in Harran, and they set out for the land of
    Canaan, and they arrived there.
esv:
  - >
    And Abram took Sarai his wife, and Lot his brother's son, and all their possessions
    that they had gathered, and the people that they had acquired in Haran, and
    they set out to go to the land of Canaan. When they came to the land of Canaan,
