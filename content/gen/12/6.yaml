verse: 6
kjv:
  - >
    And Abram passed through the land unto the place of Sichem, unto the plain of
    Moreh. And the Canaanite was then in the land.
nkjv:
  - >
    Now the land was not able to support them, that they might dwell together,
    for their possessions were so great that they could not dwell together.
niv:
  - >
    Abram traveled through the land as far as the site of the great tree of Moreh
    at Shechem. At that time the Canaanites were in the land.
esv:
  - >
    Abram passed through the land to the place at Shechem, to the oak of Moreh.
    At that time the Canaanites were in the land.
