chapter: 12
verse: 7
kjv:
  - >
    And the LORD appeared unto Abram, and said, Unto thy seed will I give this
    land: and there builded he an altar unto the LORD, who appeared unto him.
nkjv:
  - >
    Then the LORD appeared to Abram and said, "To your descendants I will give
    this land." And there he built an altar to the LORD, who had appeared to him.
niv:
  - >
    The LORD appeared to Abram and said, "To your offspring I will give this land."
    So he built an altar there to the LORD, who had appeared to him.
esv:
  - >
    Then the LORD appeared to Abram and said, "To your offspring I will give this
    land." So he built there an altar to the LORD, who had appeared to him.
