verse: 8
kjv:
  - >
    And he removed from thence unto a mountain on the east of Bethel, and pitched
    his tent, having Bethel on the west, and Hai on the east: and there he builded
    an altar unto the LORD, and called upon the name of the LORD.
nkjv:
  - >
    And he moved from there to the mountain east of Bethel, and he pitched
    his tent with Bethel on the west and Ai on the east; there he built an
    altar to the LORD and called on the name of the LORD.
niv:
  - >
    From there he went on toward the hills east of Bethel and pitched his tent,
    with Bethel on the west and Ai on the east. There he built an altar to the
    LORD and called on the name of the LORD.
esv:
  - >
    From there he moved to the hill country on the east of Bethel and pitched his
    tent, with Bethel on the west and Ai on the east. And there he built an altar
    to the LORD and called upon the name of the LORD.
